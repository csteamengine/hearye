name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: guard
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          if git tag --points-at HEAD | grep -qE '^v[0-9]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Release tag points at HEAD; skipping CI in favor of release workflow."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: build
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: src-tauri/models/ggml-base.en.bin
          key: whisper-ggml-base.en

      - name: Download Whisper model (if not cached)
        run: ./scripts/download-model.sh

      - name: Frontend type check
        run: pnpm check

      - name: Build app
        run: pnpm tauri build --target universal-apple-darwin --bundles app
