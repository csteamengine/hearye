name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build & release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: src-tauri/models/ggml-base.en.bin
          key: whisper-ggml-base.en

      - name: Download Whisper model (if not cached)
        run: ./scripts/download-model.sh

      - name: Build Tauri app (universal binary)
        run: pnpm tauri build --target universal-apple-darwin --bundles dmg,updater
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Locate artifacts
        id: artifacts
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle"
          echo "--- Bundle directory contents ---"
          find "$BUNDLE_DIR" -type f 2>/dev/null || echo "(bundle dir not found)"

          DMG=$(find "$BUNDLE_DIR" -name '*.dmg' | head -1)
          if [ -z "$DMG" ]; then echo "ERROR: no .dmg found"; exit 1; fi
          DMG_NAME="HearYe_${VERSION}_universal.dmg"
          cp "$DMG" "$DMG_NAME"
          echo "dmg=${DMG_NAME}" >> "$GITHUB_OUTPUT"

          TARGZ=$(find "$BUNDLE_DIR" -name '*.tar.gz' ! -name '*.sig' | head -1)
          if [ -z "$TARGZ" ]; then echo "ERROR: no .tar.gz found"; exit 1; fi
          TARGZ_NAME="HearYe.app.tar.gz"
          cp "$TARGZ" "$TARGZ_NAME"
          echo "targz=${TARGZ_NAME}" >> "$GITHUB_OUTPUT"

          SIG=$(find "$BUNDLE_DIR" -name '*.tar.gz.sig' | head -1)
          if [ -z "$SIG" ]; then echo "ERROR: no .sig found — signing may not have run"; exit 1; fi
          SIGNATURE=$(cat "$SIG")
          echo "signature=${SIGNATURE}" >> "$GITHUB_OUTPUT"

      - name: Generate update manifest
        run: |
          VERSION="${{ steps.artifacts.outputs.version }}"
          TAG="${{ steps.artifacts.outputs.tag }}"
          SIGNATURE="${{ steps.artifacts.outputs.signature }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          URL="https://github.com/csteamengine/hearye/releases/download/${TAG}/HearYe.app.tar.gz"

          cat > latest.json <<MANIFEST
          {
            "version": "${VERSION}",
            "notes": "Release ${TAG}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIGNATURE}",
                "url": "${URL}"
              },
              "darwin-x86_64": {
                "signature": "${SIGNATURE}",
                "url": "${URL}"
              }
            }
          }
          MANIFEST

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.artifacts.outputs.tag }}
          name: HearYe ${{ steps.artifacts.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.artifacts.outputs.dmg }}
            ${{ steps.artifacts.outputs.targz }}
            latest.json
